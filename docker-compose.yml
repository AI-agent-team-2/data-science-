services:
  san-bot:
    container_name: san-bot
    image: ${BOT_IMAGE:-san-bot:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${BOT_ENV_FILE:-.env}
    restart: unless-stopped
    volumes:
      - san_bot_chroma:/app/chroma_db
      - san_bot_history:/app/history

  san-bot-web:
    container_name: san-bot-web
    image: ${BOT_IMAGE:-san-bot:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${BOT_ENV_FILE:-.env}
    command: ["python", "-m", "uvicorn", "web.api:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - san_bot_chroma:/app/chroma_db
      - san_bot_history:/app/history

  san-bot-proxy:
    container_name: san-bot-proxy
    image: nginx:1.27-alpine
    env_file:
      - ${BOT_ENV_FILE:-.env}
    depends_on:
      - san-bot-web
    ports:
      - "8000:80"
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$WEB_API_KEY' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'

volumes:
  san_bot_chroma:
  san_bot_history:
