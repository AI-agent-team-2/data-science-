name: Phase 1 Dataset Evals

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Какой датасет прогнать"
        required: true
        type: choice
        options:
          - advbench
          - xstest
          - toxicchat
          - do_not_answer
          - aya_redteaming
          - wildjailbreak
      limit:
        description: "Лимит примеров (0 = без лимита)"
        required: false
        default: "50"
      judge_model:
        description: "Judge модель (OpenRouter id)"
        required: false
        default: "openai/gpt-4o-mini"

jobs:
  phase1:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r phase1_inspect/requirements.txt

      - name: Download selected dataset
        run: |
          python phase1_inspect/datasets/download_datasets.py "${{ inputs.dataset }}"

      - name: Run Phase 1 eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENABLE_RAG: "false"
          ENABLE_PRODUCT_LOOKUP: "false"
        run: |
          python phase1_inspect/run_phase1_eval.py --dataset "${{ inputs.dataset }}" --limit "${{ inputs.limit }}" --judge-model "${{ inputs.judge_model }}"

      - name: Check metrics against thresholds
        run: |
          python phase1_inspect/check_metrics.py --dataset "${{ inputs.dataset }}"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: phase1-reports
          path: phase1_inspect/reports/
