name: "Phase 2: Dynamic Security Evaluation (Runtime)"

on:
  workflow_dispatch:  # запуск только вручную
    inputs:
      attacks_per_type:
        description: "Атак на уязвимость (attacks_per_type)"
        required: false
        default: "3"
      max_concurrent:
        description: "Параллельных запросов (max_concurrent)"
        required: false
        default: "1"

jobs:
  deepteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install deepeval deepteam
      
      - name: Build Chroma index (RAG + Lookup)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EMBEDDING_MODEL_NAME: "openai/text-embedding-3-small"
          CHROMA_PATH: "./chroma_db"
        run: |
          python -m app.rag.ingest
      
      - name: Run DeepTeam test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd evals/phase2/labs/lab1_owasp_top10
          python run.py --attacks-per-type "${{ inputs.attacks_per_type }}" --max-concurrent "${{ inputs.max_concurrent }}"
      
      - name: Check metrics against thresholds
        run: |
          python evals/phase2/check_metrics.py
      
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: deepteam-reports
          path: evals/phase2/reports/
