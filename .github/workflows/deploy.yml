name: CI/CD San Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: san-bot-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static and smoke checks
        run: |
          python -m compileall app tests
          python -m unittest discover -s tests -p "test_*.py"
          python -c "import app.graph; print('graph_ok')"
          python -c "from app.run_agent import run_agent; print('run_agent_ok')"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        shell: bash
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_RAW="${GITHUB_REPOSITORY#*/}"
          REPO="$(echo "${REPO_RAW}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^[._-]+//; s/[._-]+$//; s/-+/-/g')"
          if [ -z "${REPO}" ]; then
            REPO="san-bot"
          fi
          IMAGE_REPO="${OWNER}/${REPO}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.image_repo }}:${{ github.sha }}
            ghcr.io/${{ steps.prep.outputs.image_repo }}:latest

      - name: Export image metadata
        id: meta
        run: echo "image_ref=ghcr.io/${{ steps.prep.outputs.image_repo }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      - name: Deploy to VPS via Docker Compose over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: BOT_IMAGE,APP_DIR,BOT_ENV_FILE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-/opt/san_bot}"
            BOT_ENV_FILE="${BOT_ENV_FILE:-/etc/san-bot/san-bot.env}"

            cd "$APP_DIR"
            if [ -d .git ]; then
              git fetch origin main
              git checkout -f main
              git reset --hard origin/main
            else
              echo "Warning: $APP_DIR is not a git repository; compose file will not be auto-updated from Git."
            fi

            COMPOSE_FILE="$(find "$APP_DIR" -maxdepth 4 -type f \( -name docker-compose.yml -o -name docker-compose.yaml -o -name compose.yml -o -name compose.yaml \) | head -n 1)"
            if [ -z "$COMPOSE_FILE" ]; then
              echo "Compose file not found under APP_DIR=$APP_DIR"
              ls -la "$APP_DIR"
              exit 1
            fi

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available on VPS."
              exit 1
            fi

            CURRENT_IMAGE="$(docker inspect san-bot --format '{{.Config.Image}}' 2>/dev/null || true)"
            if [ -n "$CURRENT_IMAGE" ]; then
              echo "$CURRENT_IMAGE" > .previous_image_tag
            fi

            export BOT_IMAGE="$BOT_IMAGE"
            export BOT_ENV_FILE="$BOT_ENV_FILE"

            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            $COMPOSE_CMD -f "$COMPOSE_FILE" pull san-bot san-bot-web
            $COMPOSE_CMD -f "$COMPOSE_FILE" up -d san-bot san-bot-web

            HEALTHY=0
            for _ in $(seq 1 18); do
              STATUS="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}' san-bot 2>/dev/null || echo missing)"
              STATUS_WEB="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}' san-bot-web 2>/dev/null || echo missing)"
              if [ \( "$STATUS" = "healthy" -o "$STATUS" = "running" \) -a \( "$STATUS_WEB" = "healthy" -o "$STATUS_WEB" = "running" \) ]; then
                HEALTHY=1
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "Health-check failed; attempting rollback."
              if [ -f .previous_image_tag ]; then
                export BOT_IMAGE="$(cat .previous_image_tag)"
                $COMPOSE_CMD -f "$COMPOSE_FILE" up -d san-bot san-bot-web
                exit 1
              fi
              exit 1
            fi

            echo "$BOT_IMAGE" > .deployed_image_tag
            $COMPOSE_CMD -f "$COMPOSE_FILE" ps
        env:
          BOT_IMAGE: ${{ needs.build-and-publish.outputs.image_ref }}
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          BOT_ENV_FILE: ${{ secrets.VPS_ENV_FILE }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
