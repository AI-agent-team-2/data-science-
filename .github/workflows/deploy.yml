name: CI/CD San Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: san-bot-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static and smoke checks
        run: |
          python -m compileall app tests
          python -m unittest discover -s tests -p "test_*.py"
          python -c "import app.graph; print('graph_ok')"
          python -c "from app.run_agent import run_agent; print('run_agent_ok')"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

      - name: Export image metadata
        id: meta
        run: echo "image_ref=ghcr.io/${{ github.repository }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      - name: Deploy to VPS via Docker Compose over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: BOT_IMAGE,APP_DIR,BOT_ENV_FILE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-/opt/san_bot}"
            BOT_ENV_FILE="${BOT_ENV_FILE:-/etc/san-bot/san-bot.env}"

            cd "$APP_DIR"

            CURRENT_IMAGE="$(docker inspect san-bot --format '{{.Config.Image}}' 2>/dev/null || true)"
            if [ -n "$CURRENT_IMAGE" ]; then
              echo "$CURRENT_IMAGE" > .previous_image_tag
            fi

            export BOT_IMAGE="$BOT_IMAGE"
            export BOT_ENV_FILE="$BOT_ENV_FILE"

            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker compose pull san-bot
            docker compose up -d san-bot

            HEALTHY=0
            for _ in $(seq 1 18); do
              STATUS="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}' san-bot 2>/dev/null || echo missing)"
              if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                HEALTHY=1
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "Health-check failed; attempting rollback."
              if [ -f .previous_image_tag ]; then
                export BOT_IMAGE="$(cat .previous_image_tag)"
                docker compose up -d san-bot
                exit 1
              fi
              exit 1
            fi

            echo "$BOT_IMAGE" > .deployed_image_tag
            docker compose ps
        env:
          BOT_IMAGE: ${{ needs.build-and-publish.outputs.image_ref }}
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          BOT_ENV_FILE: ${{ secrets.VPS_ENV_FILE }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
